<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium - Cotis App</title>
    <style>
        :root {
            --primary: #1246C8;
            --surface: #FFFFFF;
            --bg: #F9FAFB;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }
        
        .mobile-frame { width: 360px; margin: 0 auto; }
        
        /* Premium Header */
        .header { margin-bottom: 32px; }
        .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
        .header p { color: var(--text-sub); font-size: 15px; margin-top: 4px; }

        /* Premium Tiles */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .stat-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .stat-value { font-size: 22px; font-weight: 700; margin-top: 8px; font-variant-numeric: tabular-nums; }
        
        /* Premium Button */
        .action-area { margin-top: 32px; }
        .btn-premium {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #0D35A0 100%);
            color: white; font-weight: 600; font-size: 16px;
            box-shadow: 0 10px 15px -3px rgba(18, 70, 200, 0.3);
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="header">
            <h1>Accueil</h1>
            <p>Vue d’ensemble des activités</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Membres</div>
                <div class="stat-value">124</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cultes</div>
                <div class="stat-value">4</div>
            </div>
            <div class="stat-card" style="grid-column: span 2;">
                <div class="stat-label">Collecte Globale</div>
                <div class="stat-value" style="font-size: 28px; color: var(--primary);">124 500 F</div>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-premium">Démarrer le culte</button>
        </div>
    </div>
</body>
</html>
