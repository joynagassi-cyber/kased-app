<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mobile - Cotis App</title>
    <style>
        :root {
            --primary: #1246C8;
            --success: #059669;
            --warning: #D97706;
            --danger: #DC2626;
            --bg: #F7F8FC;
            --surface: #FFFFFF;
            --text-primary: #0E1631;
            --text-secondary: #4A5578;
            --border: #E2E6F3;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-primary); }
        
        /* Mobile Container simulation */
        .mobile-frame { width: 360px; margin: 0 auto; background: var(--bg); }
        
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin: 0; }
        .header p { color: var(--text-secondary); margin: 4px 0 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        /* Nouvelle signature visuelle : Bordure latérale d'accent */
        .stat-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }
        .stat-card.primary::before { background: var(--primary); }
        .stat-card.success::before { background: var(--success); }
        .stat-card.danger::before { background: var(--danger); }
        
        .stat-value { font-size: 20px; font-weight: 800; margin: 8px 0 0; }
        .stat-label { font-size: 12px; color: var(--text-secondary); }

        .btn-primary {
            display: block; width: 100%; padding: 16px; background: var(--primary);
            color: white; border-radius: 16px; border: none; font-weight: 600; margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="header">
            <h1>Accueil</h1>
            <p>Vue d’ensemble des membres</p>
        </div>

        <div class="grid">
            <div class="stat-card primary">
                <div class="stat-label">Membres</div>
                <div class="stat-value">124</div>
            </div>
            <div class="stat-card primary">
                <div class="stat-label">Cultes</div>
                <div class="stat-value">4</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Collecté</div>
                <div class="stat-value">124 500 F</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">En Retard</div>
                <div class="stat-value">12</div>
            </div>
        </div>

        <button class="btn-primary">Démarrer le culte</button>
    </div>
</body>
</html>
