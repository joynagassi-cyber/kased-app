<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium - Cotis App</title>
    <style>
        :root {
            --primary: #1246C8;
            --success: #059669;
            --danger: #DC2626;
            --surface: #FFFFFF;
            --bg: #F9FAFB;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }
        
        .mobile-frame { width: 360px; margin: 0 auto; position: relative; overflow: hidden; }

        /* Glassmorphism Circle - Top Right */
        .glass-circle {
            position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: rgba(18, 70, 200, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            z-index: -1;
        }

        .header { margin-top: 40px; margin-bottom: 32px; }
        .header h1 { font-size: 28px; font-weight: 800; }
        .header p { color: var(--text-sub); font-size: 15px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stat-card {
            background: var(--surface); padding: 20px; border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
        }
        /* Accent Borders */
        .stat-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
        .stat-card.primary::after { background: var(--primary); }
        .stat-card.success::after { background: var(--success); }
        .stat-card.danger::after { background: var(--danger); }
        
        .stat-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
        .stat-value { font-size: 20px; font-weight: 700; margin-top: 6px; }
        
        .btn-premium {
            margin-top: 32px; width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--primary), #0D35A0);
            color: white; font-weight: 600; font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="glass-circle"></div>
        <div class="header">
            <h1>Accueil</h1>
            <p>Vue d’ensemble des activités</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-label">Membres</div>
                <div class="stat-value">124</div>
            </div>
            <div class="stat-card primary">
                <div class="stat-label">Cultes</div>
                <div class="stat-value">4</div>
            </div>
            <div class="stat-card success" style="grid-column: span 2;">
                <div class="stat-label">Collecte Globale</div>
                <div class="stat-value" style="font-size: 26px; color: var(--primary);">124 500 F</div>
            </div>
        </div>

        <button class="btn-premium">Démarrer le culte</button>
    </div>
</body>
</html>
