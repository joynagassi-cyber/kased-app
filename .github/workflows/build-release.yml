name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'cotis_app/pubspec.yaml'          # déclenché quand la version change
      - 'cotis_app/lib/**'
      - 'cotis_app/android/**'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:                       # déclenchement manuel depuis l'onglet Actions
    inputs:
      bump:
        description: 'Type de bump (patch, minor, major)'
        required: false
        default: 'patch'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'               # aligné sur l'environnement de dev (Dart 3.12) — requis par pdf ^3.12.0
  JAVA_VERSION: '21'

jobs:
  build-and-release:
    name: Analyze → Build → Release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cotis_app

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Flutter SDK ───────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Flutter doctor
        run: flutter doctor -v

      # ── 3. Extraire la version depuis pubspec.yaml ───────────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | head -1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version détectée : $VERSION"

      # ── 4. Décoder le keystore (base64 → fichier .jks) ──────────────────────
      - name: Decode keystore
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
        run: |
          if [ -z "$UPLOAD_KEYSTORE_B64" ]; then
            echo "⚠️  UPLOAD_KEYSTORE_B64 non défini → sera ignoré au signing"
            exit 0
          fi
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > android/upload-keystore.jks
          echo "✅ upload-keystore.jks décodé ($(stat -c%s android/upload-keystore.jks) octets)"

      # ── 5. Créer key.properties ──────────────────────────────────────────────
      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYPROPS'
          storeFile=../upload-keystore.jks
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          KEYPROPS
          echo "✅ android/key.properties créé"

      # ── 6. Décoder google-services.json ──────────────────────────────────────
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "⚠️  GOOGLE_SERVICES_JSON_B64 non défini — Firebase désactivé"
            exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json
          echo "✅ google-services.json décodé ($(stat -c%s android/app/google-services.json) octets)"

      # ── 7. Dependencies ──────────────────────────────────────────────────────
      - name: Pub get
        run: flutter pub get

      # ── 8. Static Analysis (fail on error) ──────────────────────────────────
      - name: Dart analyze
        run: dart analyze --fatal-infos

      # ── 9. Code generation (Riverpod, Isar, etc.) ────────────────────────────
      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── 10. Tests unitaires ────────────────────────────────────────────────────
      # On exclut test/e2e/ car les animations infinies font timeout avec pumpAndSettle.
      - name: Flutter test
        run: flutter test test/unit/ test/widget/

      - name: Install CMake 3.30.5
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER=$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")
          fi
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --install "cmake;3.30.5" > /dev/null
          echo "CMake 3.30.5 installe"

      # ── 11. Build APK Release ────────────────────────────────────────────────
      - name: Build APK (release + obfuscated)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=INSFORGE_BASE_URL=${{ secrets.INSFORGE_URL }} \
            --dart-define=INSFORGE_ANON_KEY=${{ secrets.INSFORGE_ANON_KEY }} \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN || '' }}

      # ── 12. Renommer l'APK ──────────────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk/ -name '*.apk' ! -name '*debug*' | head -1)
          APK_NAME="kased-v${{ env.APP_VERSION }}.apk"
          cp "$APK_PATH" "build/$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK renommé → $APK_NAME"

      # ── 13. Upload APK (artifact CI) ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kased-v${{ env.APP_VERSION }}
          path: cotis_app/build/${{ steps.apk.outputs.apk_name }}
          retention-days: 30
          compression-level: 9

      # ── 14. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: 'Kased v${{ env.APP_VERSION }}'
          body: |
            ## 📱 Kased — v${{ env.APP_VERSION }}

            **APK Release** généré automatiquement depuis `${{ github.sha }}`.

            ### 🔧 Build info
            - Flutter ${{ env.FLUTTER_VERSION }}
            - Commit [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - Build ${{ github.run_number }}

            ### 📦 APK
            - `${{ steps.apk.outputs.apk_name }}` — installable sur Android 7+ (minSdk 24)

            ### ⚠️ Notes
            - APK obfusqué (`--obfuscate` + `--split-debug-info`)
            - Les symboles de debug sont stockés dans `build/debug-info/`
          files: cotis_app/build/${{ steps.apk.outputs.apk_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
