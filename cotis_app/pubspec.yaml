name: kased_app
description: Gestion de cotisations d'église

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^17.2.3
  
  # Base de données locale
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: any
  path_provider_android: any
  
  # UI
  google_fonts: ^8.1.0
  flutter_slidable: ^4.0.3
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.0
  haptic_feedback: ^0.5.0
  
  # Utils
  intl: ^0.20.2
  dio: ^5.8.0
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.1.0
  dio_retry_plus: ^2.0.8
  image_picker: ^1.2.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.1
  
  # Export PDF (bonus)
  pdf: ^3.12.0
  share_plus: ^12.0.2
  permission_handler: ^11.3.1

  # Google Sign-In
  google_sign_in: 6.2.1

  # Cache image
  cached_network_image: ^3.3.1

  # Monitoring (P0 — requis pour production)
  firebase_core: ^3.12.0
  firebase_crashlytics: ^4.3.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  isar_generator: ^3.1.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/kased_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/kased_logo.png"
  min_sdk_android: 21
