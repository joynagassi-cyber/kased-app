name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Scan quotidien à 2h du matin
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ============================================================================
  # SAST - Analyse statique avec Semgrep
  # ============================================================================
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
            p/typescript
            security/tools/sast-config.yml
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
  
  # ============================================================================
  # SCA - Scan des dépendances
  # ============================================================================
  dependency-scan:
    name: SCA (Dependency Scan)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          
      - name: Check for high/critical vulnerabilities
        run: |
          VULNERABILITIES=$(jq '.metadata.vulnerabilities | .high + .critical' npm-audit.json)
          echo "High/Critical vulnerabilities: $VULNERABILITIES"
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ $VULNERABILITIES high/critical vulnerabilities found"
            jq '.vulnerabilities' npm-audit.json
            exit 1
          fi
      
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.json
  
  # ============================================================================
  # Secrets Detection
  # ============================================================================
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install detect-secrets
        run: pip install detect-secrets
      
      - name: Create baseline if not exists
        run: |
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan > .secrets.baseline
          fi
      
      - name: Scan for secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
          
      - name: Check for new secrets
        run: |
          detect-secrets scan | jq '.results | length' > secret-count.txt
          NEW_SECRETS=$(cat secret-count.txt)
          
          if [ "$NEW_SECRETS" -gt 0 ]; then
            echo "❌ $NEW_SECRETS potential secrets detected"
            detect-secrets scan
            exit 1
          fi
  
  # ============================================================================
  # Agent Governance - OWASP Agentic Top 10
  # ============================================================================
  agent-governance:
    name: Agent Governance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate agent governance policy
        run: |
          echo "✅ Validating agent governance policy..."
          
          # Vérifier que la politique existe
          if [ ! -f security/governance/agent-governance-policy.yaml ]; then
            echo "❌ Agent governance policy not found"
            exit 1
          fi
          
          # Vérifier que MCP Shield est configuré
          if [ ! -f security/governance/mcp-shield-config.json ]; then
            echo "❌ MCP Shield configuration not found"
            exit 1
          fi
          
          echo "✅ Agent governance configuration valid"
  
  # ============================================================================
  # Security Configuration Check
  # ============================================================================
  config-check:
    name: Security Configuration Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for hardcoded secrets..."
          
          # Vérifier les clés API
          if grep -r "sk-[a-zA-Z0-9]\{48\}" --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "❌ API keys found in code"
            exit 1
          fi
          
          echo "✅ No hardcoded secrets found"
      
      - name: Check .env is not committed
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env file is committed"
            exit 1
          fi
          
          echo "✅ .env is not committed"
      
      - name: Check dependencies are pinned
        run: |
          if [ -f package.json ]; then
            if grep -q '"\^' package.json || grep -q '"~' package.json; then
              echo "⚠️  Unpinned dependencies detected (^ or ~)"
              exit 1
            fi
          fi
          
          echo "✅ Dependencies are pinned"
  
  # ============================================================================
  # Complete Security Scan
  # ============================================================================
  complete-scan:
    name: Complete Security Scan
    runs-on: ubuntu-latest
    needs: [semgrep, dependency-scan, secrets-scan, agent-governance, config-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          npm ci
          pip install semgrep detect-secrets
      
      - name: Run complete security scan
        run: |
          chmod +x scripts/security-scan.sh
          ./scripts/security-scan.sh
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security/reports/
  
  # ============================================================================
  # Security Summary
  # ============================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [complete-scan]
    if: always()
    
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: security/reports/
      
      - name: Generate summary
        run: |
          echo "## 🛡️ Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f security/reports/summary-*.json ]; then
            LATEST_SUMMARY=$(ls -t security/reports/summary-*.json | head -1)
            
            TOTAL=$(jq '.total_checks' $LATEST_SUMMARY)
            PASSED=$(jq '.passed' $LATEST_SUMMARY)
            FAILED=$(jq '.failed' $LATEST_SUMMARY)
            
            echo "- **Total checks**: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **✅ Passed**: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **❌ Failed**: $FAILED" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILED" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **Security issues detected. Please review the reports.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ **All security checks passed!**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
