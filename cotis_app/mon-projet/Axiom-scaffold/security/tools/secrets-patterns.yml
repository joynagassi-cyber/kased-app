# Patterns pour détecter les secrets
# Utilisé par detect-secrets et git-secrets

patterns:
  # Clés API
  - name: "OpenAI API Key"
    pattern: "sk-[a-zA-Z0-9]{48}"
    severity: CRITICAL
    
  - name: "Anthropic API Key"
    pattern: "sk-ant-[a-zA-Z0-9-]{95}"
    severity: CRITICAL
    
  - name: "AWS Access Key"
    pattern: "AKIA[0-9A-Z]{16}"
    severity: CRITICAL
    
  - name: "AWS Secret Key"
    pattern: "[0-9a-zA-Z/+=]{40}"
    severity: CRITICAL
    
  - name: "GitHub Token"
    pattern: "ghp_[a-zA-Z0-9]{36}"
    severity: CRITICAL
    
  - name: "GitHub OAuth"
    pattern: "gho_[a-zA-Z0-9]{36}"
    severity: CRITICAL
    
  - name: "Stripe API Key"
    pattern: "sk_live_[a-zA-Z0-9]{24,}"
    severity: CRITICAL
    
  - name: "Stripe Secret Key"
    pattern: "sk_test_[a-zA-Z0-9]{24,}"
    severity: HIGH
    
  - name: "Google API Key"
    pattern: "AIza[0-9A-Za-z\\-_]{35}"
    severity: CRITICAL
    
  - name: "Firebase API Key"
    pattern: "AIza[0-9A-Za-z\\-_]{35}"
    severity: CRITICAL
    
  - name: "Slack Token"
    pattern: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}"
    severity: CRITICAL
    
  - name: "Slack Webhook"
    pattern: "https://hooks.slack.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}"
    severity: HIGH
    
  # Tokens JWT
  - name: "JWT Token"
    pattern: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    severity: HIGH
    
  # Mots de passe
  - name: "Password in code"
    pattern: "(password|passwd|pwd)\\s*=\\s*['\"][^'\"]{8,}['\"]"
    severity: HIGH
    
  # Clés privées
  - name: "RSA Private Key"
    pattern: "-----BEGIN RSA PRIVATE KEY-----"
    severity: CRITICAL
    
  - name: "SSH Private Key"
    pattern: "-----BEGIN OPENSSH PRIVATE KEY-----"
    severity: CRITICAL
    
  - name: "PGP Private Key"
    pattern: "-----BEGIN PGP PRIVATE KEY BLOCK-----"
    severity: CRITICAL
    
  # Tokens d'accès
  - name: "Generic API Key"
    pattern: "api[_-]?key['\"]?\\s*[:=]\\s*['\"][a-zA-Z0-9]{32,}['\"]"
    severity: HIGH
    
  - name: "Generic Secret"
    pattern: "secret['\"]?\\s*[:=]\\s*['\"][a-zA-Z0-9]{32,}['\"]"
    severity: HIGH
    
  - name: "Generic Token"
    pattern: "token['\"]?\\s*[:=]\\s*['\"][a-zA-Z0-9]{32,}['\"]"
    severity: HIGH
    
  # Credentials
  - name: "Database URL with credentials"
    pattern: "(postgres|mysql|mongodb)://[a-zA-Z0-9]+:[a-zA-Z0-9]+@"
    severity: CRITICAL
    
  # Numéros sensibles
  - name: "Credit Card Number"
    pattern: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13})\\b"
    severity: CRITICAL
    
  - name: "Social Security Number"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    severity: CRITICAL

# Fichiers à exclure
exclude:
  - "*.md"
  - "*.txt"
  - ".git/"
  - "node_modules/"
  - "dist/"
  - "build/"
  - "coverage/"
  - "*.test.*"
  - "*.spec.*"
  - ".secrets.baseline"

# Fichiers à toujours scanner
include:
  - "*.js"
  - "*.ts"
  - "*.jsx"
  - "*.tsx"
  - "*.py"
  - "*.java"
  - "*.go"
  - "*.rb"
  - "*.php"
  - "*.env.example"
  - "*.yaml"
  - "*.yml"
  - "*.json"
