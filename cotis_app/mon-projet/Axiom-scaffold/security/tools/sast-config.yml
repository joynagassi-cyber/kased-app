# Configuration Semgrep pour Axiom-Scaffold
# Analyse statique de sécurité (SAST)

rules:
  # OWASP Top 10
  - id: owasp-a01-broken-access-control
    patterns:
      - pattern: |
          app.$METHOD($PATH, $HANDLER)
      - pattern-not: |
          app.$METHOD($PATH, authenticate, $HANDLER)
    message: "Endpoint sans authentification détecté"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: sql-injection
    patterns:
      - pattern: |
          db.query(`... ${$VAR} ...`)
      - pattern: |
          db.execute(`... ${$VAR} ...`)
    message: "Injection SQL potentielle - utiliser des requêtes paramétrées"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: hardcoded-secret
    patterns:
      - pattern: |
          const $VAR = "sk-..."
      - pattern: |
          const $VAR = "Bearer ..."
      - pattern: |
          password: "..."
    message: "Secret hardcodé détecté"
    severity: ERROR
    languages: [javascript, typescript, python]
    
  - id: eval-usage
    patterns:
      - pattern: eval($VAR)
      - pattern: Function($VAR)
    message: "Utilisation dangereuse de eval() ou Function()"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: insecure-random
    patterns:
      - pattern: Math.random()
    message: "Math.random() n'est pas cryptographiquement sécurisé - utiliser crypto.randomBytes()"
    severity: WARNING
    languages: [javascript, typescript]
    
  - id: missing-rate-limit
    patterns:
      - pattern: |
          app.post('/api/auth/login', $HANDLER)
      - pattern-not: |
          app.post('/api/auth/login', rateLimit(...), $HANDLER)
    message: "Endpoint d'authentification sans rate limiting"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: cors-wildcard
    patterns:
      - pattern: |
          cors({ origin: '*' })
    message: "CORS configuré avec wildcard (*) - utiliser une liste blanche"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: missing-helmet
    patterns:
      - pattern: |
          const app = express()
      - pattern-not: |
          app.use(helmet())
    message: "Application Express sans Helmet.js"
    severity: WARNING
    languages: [javascript, typescript]
    
  - id: jwt-no-expiration
    patterns:
      - pattern: |
          jwt.sign($PAYLOAD, $SECRET)
      - pattern-not: |
          jwt.sign($PAYLOAD, $SECRET, { expiresIn: ... })
    message: "JWT sans expiration"
    severity: ERROR
    languages: [javascript, typescript]
    
  - id: weak-crypto
    patterns:
      - pattern: crypto.createCipher(...)
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash('sha1')
    message: "Algorithme cryptographique faible ou déprécié"
    severity: ERROR
    languages: [javascript, typescript]

# Chemins à exclure
paths:
  exclude:
    - node_modules/
    - dist/
    - build/
    - .git/
    - coverage/
    - "*.test.ts"
    - "*.test.js"
    - "*.spec.ts"
    - "*.spec.js"

# Sévérités à bloquer
severity:
  block:
    - ERROR
  warn:
    - WARNING
  info:
    - INFO
