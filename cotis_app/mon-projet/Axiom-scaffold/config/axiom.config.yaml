# Axiom-Scaffold Configuration Globale
# Ce fichier définit le comportement de l'agent dans tous les environnements (VS Code, Cursor, Windsurf, CLI)

version: "2.0.0"
updated: "2026-05-09"

# Mode de fonctionnement
mode: flex  # avec approbations
description: |
  - flex: L'agent demande approbation avant les actions critiques
  - focus: L'agent travaille en autonomie totale (recommandé pour les tâches répétitives)

# Actions toujours automatiques (même en mode flex)
auto_approve_list:
  - lint
  - test
  - format
  - playwright
  - build
  - validate

# Actions nécessitant toujours une approbation (même en mode focus)
always_require_approval:
  - modify_constitution
  - modify_public_api
  - delete_database
  - modify_infrastructure
  - create_linear_project
  - modify_tech_stack

# Configuration du bootstrap
bootstrap:
  script: "./scripts/bootstrap.sh"
  auto_install_dependencies: true
  auto_index_project: true
  scan_mode: quick  # quick (surface) ou deep (complet)

# Intégrations
integrations:
  linear:
    enabled: true
    auto_sync: true
    create_tickets_on_plan: true
  
  git:
    auto_push: true
    auto_pr: false  # Créer automatiquement les PRs
    branch_prefix: "axiom/"
    commit_message_template: "{type}: {description}"
  
  mcp:
    auto_discover: true
    registry_file: "./tools/mcp-registry.yaml"

# Gestion de projet
project_management:
  decompose_mvp: true
  create_implementation_plan: true
  track_progress: true
  update_linear_status: true

# Logging
logging:
  level: detailed  # minimal, normal, detailed, debug
  output_dir: "./workspace/logs"
  git_activity: true
  pr_logs: true
  error_logs: true

# Templates
templates:
  use_templates: true
  templates_dir: "./templates"
  plan_template: "plan-template.md"
  task_template: "task-template.md"
  walkthrough_template: "walkthrough-template.md"

# Scan et indexation
indexing:
  quick_scan_timeout: 300  # 5 minutes max
  deep_scan_timeout: 1800  # 30 minutes max
  section_based: true  # Travailler par section pour les gros projets
  max_nodes_per_section: 1000

# Recherche automatique
auto_research:
  enabled: true
  search_stack: true
  search_mcps: true
  search_libraries: true
  output_dir: "./tools"

# Déterminisme
determinism:
  enabled: true
  verify_on_build: true
  hash_validation: true
  source_of_truth: "./config/axiom/source-of-truth.yaml"
  visualization_contract: "./config/axiom/visualization-contract.yaml"

# Sécurité
security:
  scan_on_commit: true
  policies_dir: "./security/policies"
  skills_dir: "./security/skills"
  auto_fix: false  # Corriger automatiquement les vulnérabilités

# Workspace
workspace:
  root: "./workspace"
  clean_on_bootstrap: false
  backup_before_clean: true

# Chemins relatifs (depuis Axiom-scaffold/)
paths:
  config: "./config"
  specs: "./specs"
  templates: "./templates"
  skills: "./skills"
  tools: "./tools"
  scripts: "./scripts"
  workspace: "./workspace"
  proposals: "./proposals"
  reports: "./reports"

# Métadonnées
metadata:
  project_name: "Axiom-Scaffold"
  description: "Système de développement agentique autonome"
  maintainer: "Axiom-Scaffold Team"
  license: "MIT"
