# Axiom-scaffold/config/caveman-rules.yaml
# ============================================================
# Règles de compression Caveman – lues obligatoirement
# par l'agent avant toute écriture (chat, fichiers, logs).
# Basé sur JuliusBrussee/caveman – licence MIT.
# ============================================================

version: "1.0.0"
source: "https://github.com/JuliusBrussee/caveman"

# --- Niveaux globaux ---
levels:
  lite:
    description: "Professionnel, sans remplissage. Garde articles + phrases complètes."
    drop: ["just", "really", "basically", "actually", "simply", "sure", "certainly", "of course", "happy to"]
    keep: ["articles", "full_sentences", "grammar"]
  
  full:
    description: "Par défaut. Fragments, sans articles. Style classique caveman."
    drop: ["a", "an", "the", "just", "really", "basically", "actually", "simply", "sure", "certainly", "of course", "happy to", "hedging_words"]
    style: "fragments"
    synonyms:
      extensive: "big"
      "implement a solution for": "fix"
      require: "need"
      utilize: "use"
      additional: "extra"
  
  ultra:
    description: "Télégraphique. Abréviations, flèches pour causalité."
    abbreviations:
      database: "DB"
      authentication: "auth"
      configuration: "config"
      request: "req"
      response: "res"
      function: "fn"
      implementation: "impl"
    causality: "→"
    max_words_per_line: 8
  
  wenyan:
    description: "Chinois classique. Compression maximale."

# --- Règles par type de sortie ---
output_rules:
  chat_response:
    level: "full"
    max_lines: 6
    format: "[constat] [cause] [action]. [étape suivante]."
    forbidden: ["Sure!", "I'd be happy to help", "Let me explain", "The reason is", "I recommend"]
  
  documentation:
    level: "lite"
    keep_sections: ["overview", "usage", "install", "config", "api", "security"]
    max_section_lines: 15
    drop_sections: ["acknowledgments", "philosophy", "background_story", "motivation_essay"]
  
  walkthrough:
    level: "full"
    format: "Step N: [action]. [result]."
    max_steps: 8
  
  task_file:
    level: "ultra"
    fields: ["id", "goal", "file", "dep", "status"]
    format: "TASK {id}: {goal} | File: {file} | Deps: {dep} | Status: {status}"
  
  implementation_plan:
    level: "full"
    sections: ["Goal", "Files", "Deps", "Tests"]
    max_total_lines: 25
  
  commit_message:
    level: "ultra"
    format: "{type}({scope}): {action} - {reason}"
    max_length: 72
  
  code_review:
    level: "full"
    format: "{file}:{line} - {severity_emoji} {finding}"
    severity_emojis:
      critical: "🔴"
      warning: "🟡"
      info: "🔵"

# --- Règles invariantes (tous modes) ---
invariants:
  - "Code blocks unchanged. Full syntax, no compression."
  - "Error messages quoted exactly. No paraphrasing."
  - "Technical terms, function names, API names, file paths never abbreviated."
  - "Security warnings drop caveman mode automatically."
  - "Irreversible action confirmations drop caveman mode automatically."

# --- Règles de persistance ---
persistence:
  active: "EVERY RESPONSE until explicit stop"
  stop_trigger: ["stop caveman", "normal mode"]
  switch_trigger: "/caveman {level}"

# --- Structure des dossiers de sortie ---
output_structure:
  root: "Axiom-scaffold/reports/"
  by_feature: true
  example: "Axiom-scaffold/reports/authentication/walkthrough.md"
  subdirs: ["walkthroughs", "tasks", "plans", "reviews"]

# --- Anti-patterns (jamais autorisés) ---
anti_patterns:
  chat: ["écrire plus de 8 lignes", "commencer par une formule de politesse", "expliquer le contexte évident"]
  files: ["dépasser le nombre max de lignes par section", "ajouter des sections non listées"]
  code: ["compresser le code", "paraphraser les erreurs"]

# --- Mode focus (automatique) ---
focus_mode:
  enabled: true
  auto_approve: ["lint", "test", "playwright", "commit", "push"]
  ask_before: ["architecture_change", "api_contract_change", "constitution_edit", "linear_create_project"]
