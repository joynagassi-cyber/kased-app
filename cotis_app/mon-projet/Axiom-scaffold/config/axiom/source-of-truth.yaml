# Axiom-Scaffold Source of Truth Manifest
# Ce fichier définit le contrat de fusion déterministe du super-graphe

version: "1.0.0"
updated: "2026-05-09"

# Sources de données
sources:
  structure:
    tool: gitnexus
    file: graph/gitnexus-graph.json
    description: "Graphe structurel (AST, dépendances, appels)"
    confidence: 1.0
    priority: 1  # Priorité la plus haute (source de vérité pour la structure)
    
  semantics:
    tool: graphify
    file: graph/graphify-graph.json
    description: "Graphe sémantique (clusters, résumés, centralité)"
    confidence: 0.85
    priority: 2
    
  documentation:
    tool: graphrag
    file: graph/doc-graph.json
    description: "Graphe documentaire (entités métier, règles, politiques)"
    confidence: 0.90
    priority: 3

# Configuration de fusion
fusion:
  strategy: priority_merge
  description: |
    En cas de conflit sur un même nœud/arête, la source avec la priorité
    la plus haute (numéro le plus bas) l'emporte. Les propriétés non
    conflictuelles sont fusionnées.
  
  # Ordre de priorité pour la résolution des conflits
  priority_order:
    - structure    # 1. GitNexus (AST, structure exacte)
    - semantics    # 2. Graphify (enrichissement sémantique)
    - documentation # 3. GraphRAG (contexte métier)
  
  # Règles de fusion par type de propriété
  merge_rules:
    # Propriétés structurelles : priorité à GitNexus
    structural:
      - signature
      - filePath
      - startLine
      - endLine
      - kind
      - uid
    
    # Propriétés sémantiques : priorité à Graphify
    semantic:
      - cluster
      - clusterSummary
      - centralityScore
      - surprisingConnections
    
    # Propriétés documentaires : priorité à GraphRAG
    documentary:
      - documentEntities
      - businessRules
      - policies
      - constraints
    
    # Propriétés fusionnées (union)
    merged:
      - tags
      - annotations
      - metadata
  
  # Fichiers de sortie
  output:
    entity_graph: graph/entity-graph.json
    layout: graph/layout.json
    hash_file: .axiom/latest-graph-hash.txt
    validation_report: .axiom/fusion-report.json

# Configuration GraphRAG pour déterminisme
graphrag:
  llm_seed: 42
  description: |
    Seed fixe pour le LLM local (si supporté). Garantit des résultats
    reproductibles pour l'extraction d'entités et de relations.
  
  # Paramètres déterministes
  deterministic_params:
    temperature: 0.0
    top_p: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0

# Configuration de validation
validation:
  schema: .axiom/schema/entity-graph.schema.json
  strict: true
  fail_on_error: true
  
  # Vérifications de cohérence
  checks:
    - no_orphan_nodes
    - no_duplicate_ids
    - valid_provenance
    - confidence_in_range
    - required_fields_present

# Configuration de hachage
hashing:
  algorithm: sha256
  include_metadata: false
  sort_keys: true
  description: |
    Le hash est calculé sur le graphe normalisé (clés triées, sans métadonnées
    temporelles) pour garantir la reproductibilité.

# Métadonnées
metadata:
  project: axiom-scaffold
  description: "Contrat de fusion déterministe pour le super-graphe de connaissances"
  maintainer: "Axiom-Scaffold Team"
  license: "MIT"
