# Axiom-Scaffold Visualization Contract
# Définit le rendu déterministe du graphe

version: "1.0.0"
updated: "2026-05-09"

# Configuration du layout
layout:
  engine: "@antv/layout"
  algorithm: "dagre"
  seed: 42
  description: |
    Algorithme Dagre avec seed fixe pour un layout déterministe.
    Le seed garantit que les positions sont identiques à chaque exécution.
  
  params:
    rankdir: "TB"          # Top to Bottom
    nodesep: 50            # Espacement horizontal entre nœuds
    ranksep: 80            # Espacement vertical entre rangs
    align: "UL"            # Alignement Upper Left
    acyclicer: "greedy"    # Algorithme de suppression de cycles
    ranker: "network-simplex"  # Algorithme de ranking

# Configuration du rendu
rendering:
  node_size:
    strategy: "proportional_to_impact"
    min_size: 20
    max_size: 80
    base_size: 40
    scale_factor: "centralityScore"
    
  node_color:
    strategy: "by_cluster"
    palette: "categorical"
    fallback: "#95a5a6"
    
  node_shape:
    by_type:
      file: "rect"
      class: "ellipse"
      function: "circle"
      method: "circle"
      interface: "diamond"
      module: "hexagon"
      entity: "star"
      policy: "triangle"
      
  edge_style:
    by_relation:
      IMPORTS:
        color: "#3498db"
        width: 1
        style: "solid"
      CALLS:
        color: "#2ecc71"
        width: 2
        style: "solid"
      EXTENDS:
        color: "#9b59b6"
        width: 2
        style: "dashed"
      IMPLEMENTS:
        color: "#e74c3c"
        width: 2
        style: "dashed"
      REQUIRES:
        color: "#f39c12"
        width: 2
        style: "dotted"
      DESCRIBED_BY:
        color: "#1abc9c"
        width: 1
        style: "dotted"
        
  labels:
    show_node_labels: true
    show_edge_labels: false
    font_size: 12
    font_family: "Arial, sans-serif"
    
  clustering:
    show_cluster_hulls: true
    hull_padding: 20
    hull_opacity: 0.2

# Configuration des filtres
filters:
  min_confidence: 0.5
  max_nodes: 1000
  exclude_types: []
  include_clusters: []

# Configuration d'export
export:
  formats:
    - json
    - svg
    - png
  output_dir: "graph"
  
# Métadonnées
metadata:
  description: "Contrat de visualisation déterministe pour Axiom-Scaffold"
  maintainer: "Axiom-Scaffold Team"
