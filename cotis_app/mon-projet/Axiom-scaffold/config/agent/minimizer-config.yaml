# ============================================================
# Axiom-Scaffold – Configuration du Minimiseur de Contexte
# Ce fichier YAML définit comment construire un prompt minimal
# pour un petit LLM à partir d'une micro‑tâche.
# ============================================================

# --- Limites globales ---
limits:
  max_tokens: 500                  # Ne jamais dépasser
  max_depth: 2                     # Profondeur dans le graphe mémoire
  max_nodes: 10                    # Nombre max de nœuds du sous‑graphe
  max_skill_summaries: 2           # Nombre max de skills injectés
  max_constraint_lines: 5          # Nombre max de règles de constitution
  token_estimate: "1 token ≈ 4 caractères"  # Estimation simple

# --- Sources de données ---
sources:
  memory:
    super_graph: "graph/super-graph.json"
    # Alternative : commande gitnexus query
    fallback_command: "npx gitnexus query --symbol ${TARGET_SYMBOL}"
  
  specs:
    constitution: "specs/rules/constitution.md"
    coding_standards: "specs/rules/coding-standards.md"
    security_policies: "specs/rules/security-policies.md"
  
  skills:
    registry: "skills/registry.json"
    summary_fields: ["objectif", "anti_patterns"]  # Quoi extraire pour le résumé

# --- Format du prompt ---
prompt_template:
  sections:
    - order: 1
      name: "TASK"
      format: "// TÂCHE : Implémente {task.signature}"
      required: true
    
    - order: 2
      name: "SIGNATURE"
      format: "// SIGNATURE :\n{task.signature}"
      required: true
    
    - order: 3
      name: "TYPES"
      format: "// TYPES ASSOCIÉS :\n{task.types}"
      required: false
    
    - order: 4
      name: "FAILED_TESTS"
      format: |
        // TESTS ÉCHOUANTS :
        {task.failed_tests}
      required: false
    
    - order: 5
      name: "DEPENDENCIES"
      format: |
        // DÉPENDANCES (signatures uniquement) :
        {memory.dependencies}
      required: false
    
    - order: 6
      name: "CONSTRAINTS"
      format: |
        // RÈGLES :
        {specs.constraints}
      required: true
    
    - order: 7
      name: "SKILLS"
      format: |
        // SKILLS ACTIVÉS :
        {skills.summaries}
      required: false

# --- Règles d'extraction ---
extraction_rules:
  memory:
    # Comment extraire le sous‑graphe depuis super-graph.json
    # Pour l'instant on donne la règle en commentaire YAML
    # car le script shell utilisera jq pour l'appliquer.
    #
    # Commande équivalente :
    # jq --arg target "$TARGET_SYMBOL" '...' graph/super-graph.json
    #
    # On garde les champs : name, signature, filePath
    # On rejette : body, implementation, docstring
    keep_fields: ["name", "signature", "filePath"]
    discard_fields: ["body", "implementation", "docstring", "comments"]
  
  specs:
    # Comment extraire les contraintes pertinentes
    # depuis les fichiers Markdown de specs.
    #
    # On cherche les lignes commençant par "- " ou "* "
    # qui contiennent des mots‑clés liés à la tâche.
    constraint_prefixes: ["- ", "* ", "1. ", "2. ", "3. "]
    keywords_mapping:
      api: ["sécurité", "rate limit", "zod", "http"]
      ui: ["accessibilité", "contraste", "responsive"]
      database: ["migration", "seed", "prisma"]
      default: ["type safety", "tests", "lint"]
  
  skills:
    # Comment générer un résumé à partir d'un skill
    # On prend les sections "Objectif" et "Anti‑patterns"
    summary_template: |
      // SKILL {name} : {objectif} | PIÈGES : {anti_patterns}

# --- Règles de troncature ---
truncation:
  # Si le prompt dépasse max_tokens, on supprime dans l'ordre :
  priority_order:
    - "SKILLS"        # Supprimer les skills en premier
    - "DEPENDENCIES"  # Puis les dépendances éloignées
    - "FAILED_TESTS"  # Puis les tests (garder au moins 1)
    - "TYPES"         # Puis les types
  
  # Les sections "TASK", "SIGNATURE" et "CONSTRAINTS" ne sont jamais tronquées.
  protected_sections: ["TASK", "SIGNATURE", "CONSTRAINTS"]
