# ============================================================
# Exemple de micro-tâche pour le minimiseur de contexte
# Ce fichier décrit une tâche de validation d'email
# ============================================================

targetSymbol: "validateEmail"

signature: |
  function validateEmail(email: string): ValidationResult

types: |
  interface ValidationResult {
    isValid: boolean;
    error?: 'MISSING_AT_SIGN' | 'INVALID_DOMAIN' | 'TOO_LONG' | 'EMPTY';
  }

failed_tests: |
  Test 2: validateEmail("userdomain.com") 
    → attendu {isValid:false, error:"MISSING_AT_SIGN"}
    → reçu {isValid:true}
  
  Test 3: validateEmail("") 
    → attendu {isValid:false, error:"EMPTY"}
    → reçu Error: Cannot read property 'includes' of undefined

keywords:
  - validation
  - email
  - auth

description: |
  Implémenter la fonction validateEmail qui valide une adresse email.
  La fonction doit retourner un objet ValidationResult avec isValid et error.
  
  Règles de validation :
  - L'email ne doit pas être vide
  - L'email doit contenir un @
  - Le domaine doit être valide
  - L'email ne doit pas dépasser 254 caractères
